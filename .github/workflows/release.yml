name: Signed Android Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/wuwaid-mobile.jks"

      - name: Test, lint, and build signed APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/wuwaid-mobile.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon clean test lint assembleRelease

      - name: Verify signature and prepare artifacts
        id: artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then TAG="${{ inputs.tag }}"; fi
          APK="WuwaID-Mobile-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          sha256sum "$APK" > SHA256sums.txt
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub prerelease/release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact.outputs.tag }}
          name: WuwaID Mobile ${{ steps.artifact.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ startsWith(steps.artifact.outputs.tag, 'v0.') }}
          files: |
            ${{ steps.artifact.outputs.apk }}
            SHA256sums.txt
